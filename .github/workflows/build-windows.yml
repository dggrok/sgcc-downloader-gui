name: build-windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - "codex/**"

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build Windows distributables
        run: pnpm dist:win

      - name: Upload Windows dist
        uses: actions/upload-artifact@v4
        with:
          name: SGCCDesktop-windows
          path: dist/
